name: Validate Public Evidence

on:
  pull_request:
  push:
    branches:
      - main
    paths:
      - database/**
      - docs/**
      - tools/**
      - .github/**
      - README.md
      - CHANGELOG.md
      - CONTRIBUTING.md
      - SECURITY.md
      - LICENSE.md
      - BINARY-LICENSE.md
      - release-notes/**
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: public-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out reviewed content
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Audit database, documentation, and public files
        run: ./tools/audit_public_tree.sh

